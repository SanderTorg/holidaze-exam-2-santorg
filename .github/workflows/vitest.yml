name: Vitest Tests Unit

on:
  push:
    branches: [ main, master, staging ]
  pull_request:
    branches: [ main, master, staging ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NOROFF_API_KEY: ${{secrets.NOROFF_API_KEY}}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Type Check
        run: npm run build
      - name: Run Vitest tests
        run: npm test
